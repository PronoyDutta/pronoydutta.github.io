<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b14" />
      <stop offset="100%" stop-color="#0a1526" />
    </linearGradient>
    
    <!-- Accent Gradient (Cyan to Teal) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" />

  <!-- Outer Duck Body / CV Voltammogram Loop -->
  <path d="M 195,215 
           C 165,225 105,300 100,320 
           C 95,335 170,395 240,395 
           C 285,395 385,270 410,205 
           C 420,180 300,110 280,135 
           C 260,160 250,215 195,215 Z" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="18" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Head & Beak Loop -->
  <path d="M 195,215 
           C 170,195 165,175 105,165 
           C 165,145 175,110 200,110 
           C 230,110 260,135 260,165 
           C 260,205 210,240 190,265" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="18" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Duck Eye -->
  <circle cx="198" cy="152" r="11" fill="#38bdf8" filter="url(#glow)" />
</svg>